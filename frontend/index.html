<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horizon Digital</title>
    <meta name="description" content="Horizon Digital - Your digital transformation partner for modern business solutions" />
    <meta name="theme-color" content="#8b5cf6" />
    <script>
      (function () {
        var storageKey = 'hd-theme';
        var theme = 'system';
        try {
          var stored = localStorage.getItem(storageKey);
          if (stored === 'light' || stored === 'dark' || stored === 'system') {
            theme = stored;
          }
        } catch (e) {}

        var resolved = theme;
        if (theme === 'system') {
          resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        var root = document.documentElement;
        root.setAttribute('data-theme', theme);
        if (resolved === 'dark') {
          root.classList.add('dark');
        }
        root.style.colorScheme = theme === 'system' ? 'light dark' : resolved;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
